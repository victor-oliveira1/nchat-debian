# This is a basic workflow to help you get started with Actions

name: CI

permissions:
  contents: write

# Controls when the workflow will run
on:
  schedule:
    - cron: '0 0 * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      build: ${{ steps.check.outputs.build }}

    steps:
      - uses: actions/checkout@v4
      
      - id: check
        name: Check latest release
        run: |
          find
          test -a nchat_build_version.txt && {
            CURRENT=$(cat nchat_build_version.txt)
          } || {
            CURRENT=$(curl -s \
            https://api.github.com/repos/d99kris/nchat/releases/latest \
            | jq -r .tag_name)
            echo $CURRENT > nchat_build_version.txt
          
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
            git add .
            git commit -m 'Updating current version'
            git push
            cd ..
          }
          
          
          LATEST=$(curl -s \
            https://api.github.com/repos/d99kris/nchat/releases/latest \
            | jq -r .tag_name)

          test "$CURRENT" = "$LATEST" && {
            echo "build=false" >> $GITHUB_OUTPUT
          } || {
            echo "build=true" >> $GITHUB_OUTPUT
            echo "$LATEST" > nchat_build_version.txt
          }

  build:
    needs: check
    if: needs.check.outputs.build == 'true'
      
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    container:
      image: debian:stable

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4         

      # Runs a set of commands using the runners shell
      - name: Build and create deb package
        run: |
          apt update
          apt install -y git sudo lsb-release equivs
          git clone https://github.com/d99kris/nchat
          cd nchat
          VERSION=$(git tag --sort=-creatordate | head -n 1)
          git checkout ${VERSION}
          apt install golang libpng-dev libx11-dev libxcb1-dev -y
          ./make.sh deps -y
          NCHAT_CMAKEARGS="-DCMAKE_INSTALL_PREFIX=/usr" ./make.sh build --no-telegram
          cd build
          make install DESTDIR=./prefix
          
          cat <<EOF1 > nchat.control
          Section: net
          Priority: optional
          Standards-Version: 3.9.2
          
          Package: nchat
          Version: ${VERSION#v}
          Maintainer: Victor Oliveira <victor.oliveira@gmx.com>
          Architecture: amd64
          Depends: libreadline8, libssl3, libncursesw6, libsqlite3-0, libmagic1, libxcb1
          Files:$(while read L; do D=${L%/*}; echo " ./prefix$L $D/"; done < install_manifest.txt)
          Description: Terminal-based Telegram / WhatsApp client
           nchat is a terminal-based chat client with support for 
           Telegram and WhatsApp. It features a modern ncurses UI.
          EOF1
          
          DEB_BUILD_OPTIONS="nostrip nodwz" equivs-build nchat.control
      
      - name: Checkout Debian repository
        uses: actions/checkout@v4
        with:
          repository: victor-oliveira1/debian_repo
          token: ${{ secrets.DEBIAN_REPO_TOKEN }}
          path: debian_repo

      - name: Find deb files
        run: |
          pwd
          find . -name "*.deb" -type f

      - name: Updating repo
        run: |
          cp nchat/build/nchat*.deb debian_repo/deb/
          apt install -y apt-utils dpkg-dev
          cd debian_repo
          dpkg-scanpackages . /dev/null > Packages
          apt-ftparchive release . > Release

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Update nchat package"
          git push
